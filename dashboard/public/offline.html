<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HQ is unreachable</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f3e9; color: #1a1535; display: flex; min-height: 100dvh;
      align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .card { max-width: 26rem; }
    h1 { font-family: Georgia, serif; font-weight: normal; color: #2e2557; font-size: 26px; }
    p { color: #756d96; font-size: 14px; line-height: 1.6; }
    button { background: #2e2557; color: #fbf8f3; border: none; border-radius: 10px;
      padding: 12px 22px; font-size: 15px; font-weight: 600; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>HQ cannot reach your Mac</h1>
    <p>The dashboard lives on your Mac, so this app needs two things: the Mac awake with the dashboard running (npm run hq), and Tailscale switched on for both this phone and the Mac.</p>
    <button onclick="location.href='/'">Try again</button>
  </div>
</body>
</html>
