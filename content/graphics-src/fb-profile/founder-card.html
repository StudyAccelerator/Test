<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;overflow:hidden}
.serif{font-family:Georgia,'Times New Roman',serif}
.card{width:1080px;height:1080px;display:flex;flex-direction:column;background:#2E2557;color:#FBF8F3}
.photo{height:560px;width:100%;object-fit:cover;object-position:center 6%;display:block}
.body{flex:1;padding:52px 80px 60px;display:flex;flex-direction:column}
.wordmark{font-size:22px;letter-spacing:6px;font-weight:700;color:#FBF8F3;opacity:.9}
.wordmark .gold{color:#C9A96E}
.rule{width:90px;height:5px;background:#C9A96E;border-radius:3px;margin:22px 0}
.facts{display:flex;gap:18px;margin-top:26px;flex-wrap:wrap}
.chip{background:rgba(251,248,243,.1);border:1px solid rgba(201,169,110,.5);border-radius:100px;padding:12px 26px;font-size:25px;color:#FBF8F3}
.footer{margin-top:auto;display:flex;justify-content:space-between;align-items:center;font-size:23px;color:#FBF8F3;opacity:.8}
.footer .name{font-weight:700}
</style></head><body>
<div class="card">
  <img class="photo" src="waleed-grad-square.jpg" alt="Dr Waleed Ahmad on graduation day">
  <div class="body">
    <div class="wordmark">A-LEVEL <span class="gold">ACCELERATORS</span></div>
    <div class="rule"></div>
    <h1 class="serif" style="font-size:50px;line-height:1.24">Six years ago I was sitting where your child is sitting. <span style="color:#C9A96E">Nobody taught me how to revise either.</span></h1>
    <div class="facts">
      <span class="chip">NHS doctor</span>
      <span class="chip">1,000+ students taught</span>
      <span class="chip">I teach it myself</span>
    </div>
    <div class="footer"><span class="name">Dr Waleed Ahmad, MBBS</span><span>alevelaccelerators.com</span></div>
  </div>
</div></body></html>
