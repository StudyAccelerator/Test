<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;overflow:hidden}
.serif{font-family:Georgia,'Times New Roman',serif}
.card{width:1080px;height:1350px;display:flex;flex-direction:column;padding:100px 90px;background:linear-gradient(160deg,#2E2557 0%,#3d3370 100%);color:#FBF8F3}
.wordmark{font-size:26px;letter-spacing:6px;font-weight:700}
.wordmark .gold{color:#C9A96E}
.rule{width:90px;height:5px;background:#C9A96E;border-radius:3px;margin:36px 0}
.footer{margin-top:auto;display:flex;justify-content:space-between;align-items:center;font-size:25px;opacity:.85}
.footer .name{font-weight:700}
</style></head><body>
<div class="card">
  <div class="wordmark">A-LEVEL <span class="gold">ACCELERATORS</span></div>
  <div class="rule"></div>
  <div class="serif" style="font-size:200px;color:#C9A96E;line-height:.6;margin-top:40px">&ldquo;</div>
  <h1 class="serif" style="font-size:74px;line-height:1.25;margin-top:10px">Two years of A&#8209;levels.<br><br>Not one person ever asked me <span style="color:#C9A96E">how</span> I was revising.</h1>
  <p style="font-size:36px;margin-top:70px;line-height:1.55;opacity:.9">The method doing the damage stays invisible, because nobody ever looks at it.</p>
  <div class="footer"><span class="name">Dr Waleed Ahmad, MBBS</span><span>alevelaccelerators.com</span></div>
</div></body></html>
