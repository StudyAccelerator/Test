<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;overflow:hidden}
.serif{font-family:Georgia,'Times New Roman',serif}
.card{width:1080px;height:1350px;display:flex;flex-direction:column;padding:80px 90px;position:relative}
.purple{background:linear-gradient(160deg,#2E2557 0%,#3d3370 100%);color:#FBF8F3}
.cream{background:#FBF8F3;color:#1a1535}
.wordmark{font-size:26px;letter-spacing:6px;font-weight:700}
.wordmark .gold{color:#C9A96E}
.rule{width:90px;height:5px;background:#C9A96E;border-radius:3px;margin:36px 0}
.footer{margin-top:auto;display:flex;justify-content:space-between;align-items:center;font-size:26px;opacity:.85}
.footer .name{font-weight:700}

</style></head><body>
<div class="card purple">
  <div class="wordmark">A-LEVEL <span class="gold">ACCELERATORS</span></div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
    <h1 class="serif" style="font-size:110px;line-height:1.15;font-weight:700">The topics you <span style="color:#C9A96E">avoid</span> are your grade.</h1>
    <p style="font-size:38px;margin-top:64px;line-height:1.6;opacity:.92">You already own the marks in your favourite topics.<br>The grade you want is sitting inside the three you keep dodging.</p>
  </div>
  <div class="footer"><span class="name">Dr Waleed Ahmad, MBBS</span><span>alevelaccelerators.com</span></div>
</div></body></html>
