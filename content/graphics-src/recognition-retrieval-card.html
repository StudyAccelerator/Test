<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;overflow:hidden}
.serif{font-family:Georgia,'Times New Roman',serif}
.card{width:1080px;height:1350px;display:flex;flex-direction:column;padding:80px 90px;position:relative}
.purple{background:linear-gradient(160deg,#2E2557 0%,#3d3370 100%);color:#FBF8F3}
.cream{background:#FBF8F3;color:#1a1535}
.wordmark{font-size:26px;letter-spacing:6px;font-weight:700}
.wordmark .gold{color:#C9A96E}
.rule{width:90px;height:5px;background:#C9A96E;border-radius:3px;margin:36px 0}
.footer{margin-top:auto;display:flex;justify-content:space-between;align-items:center;font-size:26px;opacity:.85}
.footer .name{font-weight:700}

</style></head><body>
<div class="card cream">
  <div class="wordmark" style="color:#2E2557">A-LEVEL <span class="gold">ACCELERATORS</span></div>
  <div class="rule"></div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
    <h1 class="serif" style="font-size:88px;line-height:1.2;color:#2E2557;font-weight:700">Recognition feels like learning.</h1>
    <h1 class="serif" style="font-size:88px;line-height:1.2;color:#C9A96E;font-weight:700;margin-top:30px">Exams test retrieval.</h1>
    <p style="font-size:36px;color:#1a1535;margin-top:56px;line-height:1.5">Re-reading trains "this looks familiar".<br>The exam asks you to produce it from a blank page.<br><b>Train the second one.</b></p>
  </div>
  <div class="footer" style="color:#2E2557"><span class="name">Dr Waleed Ahmad, MBBS</span><span>alevelaccelerators.com</span></div>
</div></body></html>
