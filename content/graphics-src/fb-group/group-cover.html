<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1640px;height:856px;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;overflow:hidden}
.serif{font-family:Georgia,'Times New Roman',serif}
.card{width:1640px;height:856px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#2E2557;color:#FBF8F3;position:relative}
.card::before{content:'';position:absolute;top:-260px;right:-200px;width:640px;height:640px;border-radius:50%;background:rgba(201,169,110,.10)}
.card::after{content:'';position:absolute;bottom:-300px;left:-220px;width:700px;height:700px;border-radius:50%;background:rgba(251,248,243,.05)}
.inner{position:relative;z-index:2;text-align:center;max-width:1150px;padding:0 40px}
.kicker{font-size:26px;letter-spacing:8px;font-weight:700;color:#C9A96E;text-transform:uppercase}
h1{font-size:96px;line-height:1.08;margin:26px 0 20px;color:#FBF8F3}
h1 .gold{color:#C9A96E}
.rule{width:110px;height:6px;background:#C9A96E;border-radius:3px;margin:0 auto 26px}
.sub{font-size:38px;line-height:1.35;color:#FBF8F3;opacity:.92}
.byline{margin-top:34px;font-size:28px;color:#FBF8F3;opacity:.8}
.byline b{color:#C9A96E;font-weight:700}
</style></head><body>
<div class="card">
  <div class="inner">
    <div class="kicker">A free group for parents</div>
    <h1 class="serif">A-Level Parents <span class="gold">UK</span></h1>
    <div class="rule"></div>
    <p class="sub serif">Revision that works, results day, appeals and university advice. Ask anything, I answer everything.</p>
    <p class="byline">Run by <b>Dr Waleed Ahmad</b>, NHS doctor. 1,000+ A-level students taught.</p>
  </div>
</div></body></html>
