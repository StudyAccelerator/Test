<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0}
  .cover{
    width:1640px;height:624px;position:relative;overflow:hidden;
    background:
      radial-gradient(1100px 700px at 82% -10%, #3D3272 0%, rgba(61,50,114,0) 60%),
      radial-gradient(900px 600px at 12% 115%, #241d47 0%, rgba(36,29,71,0) 55%),
      linear-gradient(135deg, #2E2557 0%, #251E49 55%, #1a1535 100%);
    font-family: Georgia, 'Times New Roman', serif;
  }
  .rule-top{position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#C9A96E,#E3CFA4 45%,#C9A96E)}
  .inner{
    position:absolute;inset:0;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;padding:0 260px;
  }
  .eyebrow{
    font-family:'Helvetica Neue',Arial,sans-serif;
    color:#C9A96E;font-size:22px;letter-spacing:4.5px;font-weight:600;
    text-transform:uppercase;margin-bottom:26px;white-space:nowrap;
  }
  h1{
    color:#F3EBD8;font-size:88px;line-height:1.08;margin:0;font-weight:700;
    text-wrap:balance;
  }
  h1 em{font-style:italic;color:#E3CFA4}
  .sub{
    font-family:'Helvetica Neue',Arial,sans-serif;
    color:rgba(243,235,216,.78);font-size:30px;margin-top:30px;letter-spacing:.4px;
  }
  .sub b{color:#E3CFA4;font-weight:600}
  .gold-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#C9A96E;vertical-align:middle;margin:0 16px 4px}
</style>
</head>
<body>
<div class="cover">
  <div class="rule-top"></div>
  <div class="inner">
    <div class="eyebrow">Dr Waleed Ahmad<span class="gold-dot"></span>NHS Doctor<span class="gold-dot"></span>Founder, A-Level Accelerators</div>
    <h1>Top grades are a <em>system</em>, not a talent.</h1>
    <div class="sub">I teach A-level students the system schools never do. Free tools at <b>alevelaccelerators.com</b></div>
  </div>
</div>
</body>
</html>
